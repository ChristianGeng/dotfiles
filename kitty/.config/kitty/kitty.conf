# ~/.config/kitty/kitty.conf
#
# Diff-from-defaults only: just the deviations that help the
# Emacs + Evil + clipboard workflow. Everything else uses kitty defaults.
#
# NOTE: kitty runs on the LOCAL machine, so this only has effect where you
# launch kitty (your laptop/workstation) -- not on remote SSH servers.

# Copy on select -- biggest UX win when grabbing logs / snippets.
copy_on_select yes

# Bigger scrollback for dev / server logs (default is small).
scrollback_lines 100000

# Explicit copy/paste bindings, robust against DE/config overrides.
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
