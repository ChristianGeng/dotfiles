---
# Personal box setup, run as a POST_HOOK after the generic box playbook.
# Standalone: invoked by provision/box-hook.sh via the ec2 repo's ansible venv,
# reusing that repo's inventory (so {{ username }} resolves from the inventory).
#
# CONVERGENCE (see provision/personal-bootstrap.sh): the shared personal-layer
# core — user tools, stow emacs+doom, environment-aware Doom, Claude Code
# (skills + MCPs), and the demo-only Claude TMPDIR hygiene — now lives in ONE
# script, personal-bootstrap.sh, used by BOTH targets (this demo POST_HOOK and
# the iva-p5 clusters via provision/push-personal.sh). This playbook is now a
# THIN demo-only wrapper that:
#   1. stages the two repos on the box (myfiles from GitHub; cgeng-ai-skills
#      rsync'd from the control node),
#   2. lays down the FULL dotfiles set with stow-deploy.sh — the ONE demo-only
#      task deliberately NOT in the shared core (bash/git/tmux/node/... ; the
#      shared core stows ONLY emacs+doom to keep a narrow footprint on the
#      shared clusters), and
#   3. runs personal-bootstrap.sh (WORK=~/project/cgeng/work, PERSONAL_TARGET=demo)
#      for everything else.
- name: cgeng personal box setup
  hosts: all
  become: yes

  vars:
    # Control-node checkout of cgeng-ai-skills (Claude skills+MCP framework),
    # rsync'd to the box so bootstrap-claude.sh can run here (no agent needed).
    # lookup('env','HOME') resolves on the control node, where box-hook.sh runs.
    cgeng_ai_skills_src: "{{ lookup('env', 'HOME') }}/work/cgeng/cgeng-ai-skills"
    work_root: "/home/ubuntu/project/{{ username }}/work"

  tasks:
    - name: Ensure the work checkout dirs exist
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ work_root }}/myfiles"
        - "{{ work_root }}/cgeng"
      become: false

    # Clone the personal dotfiles from GitHub (public, reachable). force: yes
    # discards the working-tree changes Doom tangles into the stow-symlinked
    # config.el, so a re-run pull never aborts with "Local modifications exist".
    - name: Clone personal dotfiles (myfiles) from GitHub
      tags: [dotfiles]
      git:
        repo: https://github.com/ChristianGeng/dotfiles.git
        dest: "{{ work_root }}/myfiles/dotfiles"
        version: main
        force: yes
      become: false

    # Stage cgeng-ai-skills from the control node (no GitLab creds on the box).
    - name: Deploy cgeng-ai-skills to the box (rsync from control node)
      tags: [claude, skills]
      ansible.posix.synchronize:
        src: "{{ cgeng_ai_skills_src }}/"
        dest: "{{ work_root }}/cgeng/cgeng-ai-skills/"
        rsync_opts:
          - "--exclude=.venv"
          - "--exclude=build"
          - "--exclude=htmlcov"
          - "--exclude=.coverage"
          - "--exclude=.cache"
          - "--exclude=__pycache__"
          - "--exclude=*.egg-info"
      become: false

    # DEMO-ONLY: lay down the FULL dotfiles set (bash/git/tmux/node/emacs/doom).
    # personal-bootstrap.sh deliberately stows ONLY emacs+doom (narrow footprint
    # on the shared clusters); the demo box is a single-user personal box, so we
    # want the whole shell config here. Runs first so personal-bootstrap's own
    # emacs+doom stow is a harmless no-op and `doom sync` sees the stowed config.
    - name: Deploy the full myfiles dotfiles set with GNU stow
      tags: [dotfiles]
      command:
        cmd: ./stow-deploy.sh
        chdir: "{{ work_root }}/myfiles/dotfiles"
      environment:
        HOME: /home/ubuntu
      become: false
      changed_when: true

    # Shared personal-layer core: user tools, stow emacs+doom, environment-aware
    # Doom (in-place on this normal-disk box), Claude Code (skills + MCPs), and
    # the demo TMPDIR hygiene. PERSONAL_TARGET=demo forces the demo profile even
    # though FS auto-detection would already pick it on this ext4 box.
    - name: Run the shared personal-bootstrap (core + demo hygiene)
      tags: [personal, claude, doom]
      command:
        cmd: bash provision/personal-bootstrap.sh {{ work_root }}
        chdir: "{{ work_root }}/myfiles/dotfiles"
      environment:
        HOME: /home/ubuntu
        PERSONAL_TARGET: demo
        PATH: "/home/ubuntu/.local/bin:{{ ansible_env.PATH }}"
      become: false
      changed_when: true
